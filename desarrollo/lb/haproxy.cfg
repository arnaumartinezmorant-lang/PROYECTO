# HAProxy: balanceador de carga del frontal web (rol de LB01 en el diseno).
# Reparte entre WEB01 y WEB02 con comprobacion de salud (/health) y publica un
# PANEL de estadisticas en el puerto 8404 para ver el balanceo en vivo.

global
    log stdout format raw local0
    maxconn 2000

defaults
    mode http
    log global
    option httplog
    option http-server-close
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

# --- Frontal: recibe las peticiones y las manda al pool ---
frontend web_front
    bind *:80
    default_backend web_pool

# --- Pool de servidores web (balanceo round-robin con health check) ---
backend web_pool
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server web01 web01:8001 check inter 2s fall 2 rise 1
    server web02 web02:8001 check inter 2s fall 2 rise 1

# --- Panel de estadisticas (cuadro de mando visual del balanceo) ---
frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
