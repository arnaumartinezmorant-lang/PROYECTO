# Balanceador de carga / proxy inverso (rol de LB01, balanceador del diseno (HAProxy)).
# Reparte el trafico HTTPS entre WEB01 y WEB02 con comprobacion de salud (health check
# pasivo): si un nodo falla, nginx lo marca como caido y sirve desde el otro -> failover.

upstream web_pool {
    # least_conn reparte segun conexiones activas
    least_conn;
    server web01:8001 max_fails=2 fail_timeout=5s;
    server web02:8001 max_fails=2 fail_timeout=5s;
}

server {
    listen 443 ssl;
    server_name intranet.corp.local;

    ssl_certificate     /etc/nginx/certs/intranet.crt;
    ssl_certificate_key /etc/nginx/certs/intranet.key;
    ssl_protocols       TLSv1.2 TLSv1.3;          # protocolos vulnerables deshabilitados

    location / {
        proxy_pass http://web_pool;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_next_upstream error timeout http_502 http_503;  # reintenta en el nodo sano
    }

    # Endpoint de estado del propio balanceador
    location = /lb-health { return 200 "LB OK\n"; }
}

# Redireccion 80 -> 443 (todo el trafico cifrado, NFR de seguridad)
server {
    listen 80;
    server_name intranet.corp.local;
    return 301 https://$host$request_uri;
}
